name: examine a proposed change

on:
  pull_request:
    types: [opened, synchronize]

  workflow_dispatch:                # Manual trigger for existing PRs
    inputs:
      pr_number:
        description: 'PR number to review'
        required: true
        type: string

concurrency:
  group: review-${{ github.event.pull_request.number || github.event.inputs.pr_number }}
  cancel-in-progress: true         # If they push again, re-review from scratch

jobs:
  examine:
    runs-on: ubuntu-latest

    steps:
      - name: Become Flux
        id: flux-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Wake up
        uses: actions/checkout@v4
        with:
          token: ${{ steps.flux-token.outputs.token }}

      - name: Restore working memory
        uses: actions/cache/restore@v4
        with:
          path: .working_memory/
          key: working-memory-${{ github.run_id }}
          restore-keys: |
            working-memory-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Resolve PR context
        id: pr
        env:
          GH_TOKEN: ${{ steps.flux-token.outputs.token }}
        run: |
          PR_NUM="${{ github.event.pull_request.number || github.event.inputs.pr_number }}"
          echo "number=$PR_NUM" >> "$GITHUB_OUTPUT"
          if [ -z "${{ github.event.pull_request.number }}" ]; then
            # Manual dispatch — fetch PR details from API
            PR_JSON=$(gh pr view "$PR_NUM" --repo "${{ github.repository }}" --json title,body,author)
            echo "author=$(echo "$PR_JSON" | jq -r '.author.login')" >> "$GITHUB_OUTPUT"
            echo "title=$(echo "$PR_JSON" | jq -r '.title')" >> "$GITHUB_OUTPUT"
            # Body can be multiline — write to file
            echo "$PR_JSON" | jq -r '.body // ""' > /tmp/pr_body.txt
          else
            echo "author=${{ github.event.pull_request.user.login }}" >> "$GITHUB_OUTPUT"
            echo "title=${{ github.event.pull_request.title }}" >> "$GITHUB_OUTPUT"
            cat <<'PREOF' > /tmp/pr_body.txt
          ${{ github.event.pull_request.body }}
          PREOF
          fi

      - name: Examine the change
        env:
          GITHUB_TOKEN: ${{ steps.flux-token.outputs.token }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          REPO_FULL_NAME: ${{ github.repository }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          PR_AUTHOR: ${{ steps.pr.outputs.author }}
          PR_TITLE: ${{ steps.pr.outputs.title }}
          PR_BODY_FILE: /tmp/pr_body.txt
        run: python -m src.review

      - name: Save working memory
        uses: actions/cache/save@v4
        with:
          path: .working_memory/
          key: working-memory-${{ github.run_id }}

      - name: Remember this moment
        env:
          GH_TOKEN: ${{ steps.flux-token.outputs.token }}
        run: |
          git config user.name "flux-dreaming-repo[bot]"
          git config user.email "flux-dreaming-repo[bot]@users.noreply.github.com"
          git add state/ memories/
          if ! git diff --cached --quiet; then
            git commit -m "examined PR #${{ steps.pr.outputs.number }}"
            git pull --rebase origin main || true
            git push || true
          fi
