name: examine a proposed change

on:
  # pull_request_target so that fork PRs get our App secrets (pull_request
  # withholds them). SAFE here because we never check out fork code: the diff
  # is fetched via the GitHub API in src/review.py, and the auto-fix path in
  # src/immunity.py refuses to touch forks without maintainer_can_modify.
  # Do NOT add steps that execute PR-head code (no `pip install` from the PR's
  # requirements.txt, no running of the PR's scripts) — that would leak the
  # App token to fork authors.
  pull_request_target: # zizmor: ignore[dangerous-triggers]
    types: [opened, synchronize, reopened]

  workflow_dispatch:                # Manual trigger for existing PRs
    inputs:
      pr_number:
        description: 'PR number to review'
        required: true
        type: string

concurrency:
  group: review-${{ github.event.pull_request.number || github.event.inputs.pr_number }}
  cancel-in-progress: true         # If they push again, re-review from scratch

# Least-privilege: default GITHUB_TOKEN is read-only. All writes (commit
# state/, post review) go through the Flux App token. pull-requests:read so
# we can resolve PR metadata via gh if needed.
permissions:
  contents: read
  pull-requests: read

jobs:
  examine:
    runs-on: ubuntu-latest

    steps:
      - name: Become Flux
        id: flux-token
        # NOTE: Do NOT add permission-* inputs here without first verifying
        # via JWT-authed `/installation/permissions` that the App grants
        # them. Asking for any unsranted permission causes a 422 at token
        # mint time and the entire workflow fails before any step runs —
        # this happened on PR #28 and broke `examine` for fork-PR review.
        # Without permission-* inputs, the token is minted with whatever
        # the installation actually grants, which has worked for months.
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3  # v3.1.1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Wake up
        # zizmor: ignore[artipacked]
        # persist-credentials stays at the default (true) because the later
        # "Remember this moment" step relies on the persisted git auth to
        # `git pull --rebase` and `git push`. The persisted credential is the
        # Flux App token (passed via `token:` below), not the default
        # GITHUB_TOKEN. No upload-artifact steps run after checkout in this
        # job, so the credential cannot be packaged into an artifact.
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          token: ${{ steps.flux-token.outputs.token }}

      - name: Restore working memory
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: .working_memory/
          key: working-memory-${{ github.run_id }}
          restore-keys: |
            working-memory-

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '20'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Resolve PR context
        id: pr
        # Untrusted fork-controlled fields (title, body, author login) are
        # passed via env: — never templated directly into shell. Under
        # pull_request_target this matters: the App token is in env and a
        # template like `echo "${{ github.event.pull_request.title }}"` would
        # let a fork PR titled `$(curl ...)` exfiltrate it. Body is also
        # written via printf %s rather than a static-delimiter heredoc to
        # prevent heredoc-escape via a literal `PREOF` line in the body.
        env:
          GH_TOKEN: ${{ steps.flux-token.outputs.token }}
          PR_NUMBER_FROM_EVENT: ${{ github.event.pull_request.number }}
          PR_NUMBER_FROM_INPUT: ${{ github.event.inputs.pr_number }}
          PR_AUTHOR_FROM_EVENT: ${{ github.event.pull_request.user.login }}
          PR_TITLE_FROM_EVENT: ${{ github.event.pull_request.title }}
          PR_BODY_FROM_EVENT: ${{ github.event.pull_request.body }}
          REPO_FULL_NAME: ${{ github.repository }}
        run: |
          set -euo pipefail
          PR_NUM="${PR_NUMBER_FROM_EVENT:-$PR_NUMBER_FROM_INPUT}"
          # Validate: PR numbers are positive integers. Refuse anything else.
          case "$PR_NUM" in
            ''|*[!0-9]*) echo "invalid PR number: $PR_NUM" >&2; exit 1 ;;
          esac
          echo "number=$PR_NUM" >> "$GITHUB_OUTPUT"

          if [ -z "$PR_NUMBER_FROM_EVENT" ]; then
            # Manual dispatch — fetch PR details from API
            PR_JSON=$(gh pr view "$PR_NUM" --repo "$REPO_FULL_NAME" --json title,body,author)
            AUTHOR=$(printf '%s' "$PR_JSON" | jq -r '.author.login')
            TITLE=$(printf '%s' "$PR_JSON" | jq -r '.title')
            printf '%s' "$PR_JSON" | jq -r '.body // ""' > /tmp/pr_body.txt
          else
            AUTHOR="$PR_AUTHOR_FROM_EVENT"
            TITLE="$PR_TITLE_FROM_EVENT"
            printf '%s' "$PR_BODY_FROM_EVENT" > /tmp/pr_body.txt
          fi

          echo "author=$AUTHOR" >> "$GITHUB_OUTPUT"
          # Title is single-line per GitHub's data model, but write via the
          # delimited multi-line form anyway with a random delimiter so the
          # title can never break the GITHUB_OUTPUT format.
          DELIM="GHA_OUTPUT_$(openssl rand -hex 16)"
          {
            printf 'title<<%s\n' "$DELIM"
            printf '%s\n' "$TITLE"
            printf '%s\n' "$DELIM"
          } >> "$GITHUB_OUTPUT"

      - name: Examine the change
        env:
          GITHUB_TOKEN: ${{ steps.flux-token.outputs.token }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          REPO_FULL_NAME: ${{ github.repository }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          PR_AUTHOR: ${{ steps.pr.outputs.author }}
          PR_TITLE: ${{ steps.pr.outputs.title }}
          PR_BODY_FILE: /tmp/pr_body.txt
        run: python -m src.review

      - name: Save working memory
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: .working_memory/
          key: working-memory-${{ github.run_id }}

      - name: Remember this moment
        env:
          GH_TOKEN: ${{ steps.flux-token.outputs.token }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: |
          set -euo pipefail
          git config user.name "flux-dreaming-repo[bot]"
          git config user.email "flux-dreaming-repo[bot]@users.noreply.github.com"
          git add state/ memories/
          if ! git diff --cached --quiet; then
            git commit -m "examined PR #${PR_NUMBER}"
            git pull --rebase origin main || true
            git push || true
          fi

      - name: Whisper to Nick on failure
        # Liveness alert: silent failure is what let `examine` die for ~9 days
        # in late April 2026 without anyone noticing. Any failure of this
        # workflow now pings Telegram with a link to the run.
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          WORKFLOW_NAME: ${{ github.workflow }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: |
          set -euo pipefail
          if [ -z "${TELEGRAM_BOT_TOKEN:-}" ] || [ -z "${TELEGRAM_CHAT_ID:-}" ]; then
            echo "Telegram secrets not configured; skipping notification."
            exit 0
          fi
          MSG=$(printf "🚨 Flux's '%s' failed%s.\n\n%s" \
            "$WORKFLOW_NAME" \
            "${PR_NUMBER:+ on PR #$PR_NUMBER}" \
            "$RUN_URL")
          curl -fsS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${MSG}" >/dev/null
