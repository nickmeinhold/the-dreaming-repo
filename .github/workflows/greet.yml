name: notice a new friend

on:
  watch:
    types: [started]               # Someone starred the repo

concurrency:
  group: greeting
  cancel-in-progress: false

# Least-privilege: default GITHUB_TOKEN is read-only; the Flux App token
# below does any writes (commit greeting, push).
permissions:
  contents: read

jobs:
  greet:
    runs-on: ubuntu-latest

    steps:
      - name: Become Flux
        id: flux-token
        # Per-workflow App-token scoping: greet only commits a greeting +
        # touches state/vitals.json. No issues, no admin, no PR write.
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3  # v3.1.1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          permission-contents: write

      - name: Wake up
        # zizmor: ignore[artipacked]
        # persist-credentials stays at the default (true) because the later
        # "Remember this moment" step relies on the persisted git auth to
        # `git pull --rebase` and `git push` the greeting. The persisted
        # credential is the Flux App token (passed via `token:` below), not
        # the default GITHUB_TOKEN. The artipacked-relevant invariant: no
        # upload-artifact step runs after checkout, AND no later step writes
        # the working tree or git config to anywhere outside this runner.
        # Future maintainers adding either must re-evaluate this waiver.
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          token: ${{ steps.flux-token.outputs.token }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '20'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Notice the new friend
        env:
          GITHUB_TOKEN: ${{ steps.flux-token.outputs.token }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          STARGAZER: ${{ github.actor }}
          REPO_FULL_NAME: ${{ github.repository }}
        run: python -m src.greet

      - name: Remember this moment
        env:
          GH_TOKEN: ${{ steps.flux-token.outputs.token }}
        run: |
          git config user.name "flux-dreaming-repo[bot]"
          git config user.email "273547980+flux-dreaming-repo[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git add greetings/ state/vitals.json
          if ! git diff --cached --quiet; then
            git commit -m "notice: a new friend arrived"
            git push
          fi
