name: notice a new friend

on:
  watch:
    types: [started]               # Someone starred the repo

concurrency:
  group: greeting
  cancel-in-progress: false

# Least-privilege: default GITHUB_TOKEN is read-only; the Flux App token
# below does any writes (commit greeting, push).
permissions:
  contents: read

jobs:
  greet:
    runs-on: ubuntu-latest

    steps:
      - name: Become Flux
        id: flux-token
        # Per-workflow App-token scoping: greet only commits a greeting +
        # touches state/vitals.json. No issues, no admin, no PR write.
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547  # v1.12.0
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          permission-contents: write

      - name: Wake up
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          token: ${{ steps.flux-token.outputs.token }}

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '20'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Notice the new friend
        env:
          GITHUB_TOKEN: ${{ steps.flux-token.outputs.token }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          STARGAZER: ${{ github.actor }}
          REPO_FULL_NAME: ${{ github.repository }}
        run: python -m src.greet

      - name: Remember this moment
        env:
          GH_TOKEN: ${{ steps.flux-token.outputs.token }}
        run: |
          git config user.name "flux-dreaming-repo[bot]"
          git config user.email "273547980+flux-dreaming-repo[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git add greetings/ state/vitals.json
          if ! git diff --cached --quiet; then
            git commit -m "notice: a new friend arrived"
            git push
          fi
