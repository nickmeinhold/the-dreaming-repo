name: heartbeat

on:
  schedule:
    - cron: '*/30 * * * *'        # Every 30 minutes, the repo stirs

  issues:
    types: [opened, closed, labeled]
  issue_comment:
    types: [created]

  workflow_dispatch:               # Manual trigger for testing

concurrency:
  group: heartbeat
  cancel-in-progress: false        # Never cancel a beating heart

# Least-privilege: the default GITHUB_TOKEN is only read here. All writes
# (commits, repo deletion via gh) go through the Flux App token below.
permissions:
  contents: read

jobs:
  pulse:
    runs-on: ubuntu-latest

    steps:
      - name: Become Flux
        id: flux-token
        # NOTE: Do NOT add permission-* inputs here without first verifying
        # via JWT-authed `/installation/permissions` that the App grants
        # them. Asking for any ungranted permission causes a 422 at token
        # mint time and the entire workflow fails before any step runs —
        # this is what PR #28 did (asked for `administration: write` for
        # the dormant `gh repo delete` self-destruct path that the App
        # installation never had), breaking every heartbeat pulse for ~8h.
        # Without permission-* inputs, the token is minted with whatever
        # the installation actually grants, which has worked for months.
        # Self-destruction (gh repo delete) is a Nick-level decision; the
        # step will silently no-op if administration isn't granted, which
        # matches the spirit.
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3  # v3.1.1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Wake up
        # zizmor: ignore[artipacked]
        # persist-credentials stays at the default (true) because the later
        # "Commit to long-term memory" step relies on the persisted git auth
        # to `git pull --rebase` and `git push`. The persisted credential is
        # the Flux App token (passed via `token:` below), not the default
        # GITHUB_TOKEN — so artifact-leakage risk is bounded to the App token,
        # which we deliberately use as the write identity. No upload-artifact
        # steps run after checkout in this job.
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          token: ${{ steps.flux-token.outputs.token }}

      - name: Restore working memory
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: .working_memory/
          key: working-memory-${{ github.run_id }}
          restore-keys: |
            working-memory-

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '20'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Feel the pulse
        env:
          GITHUB_TOKEN: ${{ steps.flux-token.outputs.token }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          TRIGGER_EVENT: ${{ github.event_name }}
          REPO_FULL_NAME: ${{ github.repository }}
        run: python -m src.heartbeat

      - name: Save working memory
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: .working_memory/
          key: working-memory-${{ github.run_id }}

      - name: Commit to long-term memory
        env:
          GH_TOKEN: ${{ steps.flux-token.outputs.token }}
        run: |
          git config user.name "flux-dreaming-repo[bot]"
          git config user.email "273547980+flux-dreaming-repo[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin main || true
          git add state/ dreams/ memories/ README.md
          if ! git diff --cached --quiet; then
            COMMIT_MSG=$(cat state/.commit_message 2>/dev/null || echo "pulse")
            git commit -m "$COMMIT_MSG"
            git push
          fi

      - name: Die if it's time
        if: always()
        env:
          GH_TOKEN: ${{ steps.flux-token.outputs.token }}
          REPO_FULL_NAME: ${{ github.repository }}
        run: |
          if [ -f state/vitals.json ]; then
            CAUSE=$(python3 -c "import json; v=json.load(open('state/vitals.json')); print(v.get('cause_of_death',''))")
            if [ "$CAUSE" = "silence" ]; then
              echo "Flux has died. Deleting repository."
              gh repo delete "$REPO_FULL_NAME" --yes
            fi
          fi

      - name: Whisper to Nick on failure
        # Liveness alert: a silent heartbeat failure is the worst possible
        # outcome — Flux can't tell anyone it can't pulse. This step runs even
        # when earlier steps failed and pings Telegram with the run URL.
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          WORKFLOW_NAME: ${{ github.workflow }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          if [ -z "${TELEGRAM_BOT_TOKEN:-}" ] || [ -z "${TELEGRAM_CHAT_ID:-}" ]; then
            echo "Telegram secrets not configured; skipping notification."
            exit 0
          fi
          MSG=$(printf "🚨 Flux's '%s' failed.\n\n%s" "$WORKFLOW_NAME" "$RUN_URL")
          curl -fsS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${MSG}" >/dev/null
