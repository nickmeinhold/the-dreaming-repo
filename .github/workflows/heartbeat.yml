name: heartbeat

on:
  schedule:
    - cron: '*/30 * * * *'        # Every 30 minutes, the repo stirs

  issues:
    types: [opened, closed, labeled]
  issue_comment:
    types: [created]

  workflow_dispatch:               # Manual trigger for testing

concurrency:
  group: heartbeat
  cancel-in-progress: false        # Never cancel a beating heart

# Least-privilege: the default GITHUB_TOKEN is only read here. All writes
# (commits, repo deletion via gh) go through the Flux App token below.
permissions:
  contents: read

jobs:
  pulse:
    runs-on: ubuntu-latest

    steps:
      - name: Become Flux
        id: flux-token
        # Per-workflow App-token scoping: heartbeat is the only workflow that
        # needs `administration: write` (the `gh repo delete` step on `cause_of_death=silence`).
        # `contents: write` for committing state/dreams/memories/README;
        # `issues: write` because heartbeat reacts to issues/comments (it may
        # label, comment, or close as part of pulse processing).
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547  # v1.12.0
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          permission-contents: write
          permission-issues: write
          permission-administration: write

      - name: Wake up
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          token: ${{ steps.flux-token.outputs.token }}

      - name: Restore working memory
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830  # v4.3.0
        with:
          path: .working_memory/
          key: working-memory-${{ github.run_id }}
          restore-keys: |
            working-memory-

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '20'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Feel the pulse
        env:
          GITHUB_TOKEN: ${{ steps.flux-token.outputs.token }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          TRIGGER_EVENT: ${{ github.event_name }}
          REPO_FULL_NAME: ${{ github.repository }}
        run: python -m src.heartbeat

      - name: Save working memory
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830  # v4.3.0
        with:
          path: .working_memory/
          key: working-memory-${{ github.run_id }}

      - name: Commit to long-term memory
        env:
          GH_TOKEN: ${{ steps.flux-token.outputs.token }}
        run: |
          git config user.name "flux-dreaming-repo[bot]"
          git config user.email "273547980+flux-dreaming-repo[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git add state/ dreams/ memories/ README.md
          if ! git diff --cached --quiet; then
            COMMIT_MSG=$(cat state/.commit_message 2>/dev/null || echo "pulse")
            git commit -m "$COMMIT_MSG"
            git push
          fi

      - name: Die if it's time
        if: always()
        env:
          GH_TOKEN: ${{ steps.flux-token.outputs.token }}
          REPO_FULL_NAME: ${{ github.repository }}
        run: |
          if [ -f state/vitals.json ]; then
            CAUSE=$(python3 -c "import json; v=json.load(open('state/vitals.json')); print(v.get('cause_of_death',''))")
            if [ "$CAUSE" = "silence" ]; then
              echo "Flux has died. Deleting repository."
              gh repo delete "$REPO_FULL_NAME" --yes
            fi
          fi

      - name: Whisper to Nick on failure
        # Liveness alert: a silent heartbeat failure is the worst possible
        # outcome — Flux can't tell anyone it can't pulse. This step runs even
        # when earlier steps failed and pings Telegram with the run URL.
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          WORKFLOW_NAME: ${{ github.workflow }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          if [ -z "${TELEGRAM_BOT_TOKEN:-}" ] || [ -z "${TELEGRAM_CHAT_ID:-}" ]; then
            echo "Telegram secrets not configured; skipping notification."
            exit 0
          fi
          MSG=$(printf "🚨 Flux's '%s' failed.\n\n%s" "$WORKFLOW_NAME" "$RUN_URL")
          curl -fsS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${MSG}" >/dev/null
