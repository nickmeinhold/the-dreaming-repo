name: heartbeat

on:
  schedule:
    - cron: '*/30 * * * *'        # Every 30 minutes, the repo stirs

  issues:
    types: [opened, closed, labeled]
  issue_comment:
    types: [created]

  workflow_dispatch:               # Manual trigger for testing

concurrency:
  group: heartbeat
  cancel-in-progress: false        # Never cancel a beating heart

# Least-privilege: the default GITHUB_TOKEN reads repo content and writes
# issues (only used by the failure-alert step's dedupe path — see
# "Whisper to Nick on failure" below). All other writes (commits, repo
# deletion) go through the Flux App token. issues:write is on the default
# token deliberately: if the Flux App token mint fails (PR #28 scenario),
# the alert path must not depend on the same authority that just broke.
permissions:
  contents: read
  issues: write

jobs:
  pulse:
    runs-on: ubuntu-latest

    steps:
      - name: Become Flux
        id: flux-token
        # NOTE: Do NOT add permission-* inputs here without first verifying
        # via JWT-authed `/installation/permissions` that the App grants
        # them. Asking for any ungranted permission causes a 422 at token
        # mint time and the entire workflow fails before any step runs —
        # this is what PR #28 did (asked for `administration: write` for
        # the dormant `gh repo delete` self-destruct path that the App
        # installation never had), breaking every heartbeat pulse for ~8h.
        # Without permission-* inputs, the token is minted with whatever
        # the installation actually grants, which has worked for months.
        # Self-destruction (gh repo delete) is a Nick-level decision; the
        # step will silently no-op if administration isn't granted, which
        # matches the spirit.
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3  # v3.1.1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Wake up
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          token: ${{ steps.flux-token.outputs.token }}

      - name: Restore working memory
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: .working_memory/
          key: working-memory-${{ github.run_id }}
          restore-keys: |
            working-memory-

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '20'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Feel the pulse
        env:
          GITHUB_TOKEN: ${{ steps.flux-token.outputs.token }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          TRIGGER_EVENT: ${{ github.event_name }}
          REPO_FULL_NAME: ${{ github.repository }}
        run: python -m src.heartbeat

      - name: Save working memory
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: .working_memory/
          key: working-memory-${{ github.run_id }}

      - name: Commit to long-term memory
        env:
          GH_TOKEN: ${{ steps.flux-token.outputs.token }}
        run: |
          set -euo pipefail
          git config user.name "flux-dreaming-repo[bot]"
          git config user.email "273547980+flux-dreaming-repo[bot]@users.noreply.github.com"

          # `--autostash` silently leaves literal conflict markers
          # (`<<<<<<<` / `=======` / `>>>>>>>`) in the working tree if
          # the stash pop conflicts with rebased upstream changes. The
          # previous `|| true` swallowed that failure; the next `git add`
          # then unconditionally staged the broken files; commit + push
          # landed conflict markers on main.
          #
          # On 2026-05-04 this lined up such that state/vitals.json on
          # main carried conflict markers for ~14h, breaking watchdog's
          # jq parse of the heartbeat-liveness check and triggering 33
          # Telegram pings overnight.
          #
          # Defense: scan the tree for conflict markers AFTER the rebase
          # and refuse to commit if any are present. Failing the heartbeat
          # loudly is strictly better than polluting main — the failure-
          # alert step fires (with dedupe via PR #40), Nick gets ONE page,
          # and the next 30-min pulse starts from a clean checkout.
          git pull --rebase --autostash origin main || true

          # Capture into a variable rather than `grep | grep -q .`. The
          # pipeline form is unsafe under `set -euo pipefail`: `grep -q`
          # exits 0 on the first match and closes the pipe, the upstream
          # recursive grep gets SIGPIPE (rc=141), and `pipefail`
          # propagates that as the pipeline status — so the `if` reads
          # false even when markers exist. Capturing avoids the pipe
          # entirely. (Carnot's HIGH finding on PR #43 cage-match.)
          MARKER_FILES=$(grep -lrE '^(<<<<<<< |=======$|>>>>>>> )' \
            state/ dreams/ memories/ README.md 2>/dev/null || true)
          if [ -n "$MARKER_FILES" ]; then
            echo "::error::autostash pop left conflict markers; refusing to commit"
            echo "Files with markers:"
            printf '%s\n' "$MARKER_FILES"
            exit 1
          fi

          git add state/ dreams/ memories/ README.md
          if ! git diff --cached --quiet; then
            COMMIT_MSG=$(cat state/.commit_message 2>/dev/null || echo "pulse")
            git commit -m "$COMMIT_MSG"
            git push
          fi

      - name: Die if it's time
        if: always()
        env:
          GH_TOKEN: ${{ steps.flux-token.outputs.token }}
          REPO_FULL_NAME: ${{ github.repository }}
        run: |
          if [ -f state/vitals.json ]; then
            CAUSE=$(python3 -c "import json; v=json.load(open('state/vitals.json')); print(v.get('cause_of_death',''))")
            if [ "$CAUSE" = "silence" ]; then
              echo "Flux has died. Deleting repository."
              gh repo delete "$REPO_FULL_NAME" --yes
            fi
          fi

      - name: Whisper to Nick on failure
        # Liveness alert with dedupe: silent heartbeat failure is the worst
        # outcome — Flux can't tell anyone it can't pulse. This step runs
        # even when earlier steps failed.
        #
        # Dedupe semantics (borrowed from watchdog.yml's open-or-update idiom):
        # - First failure since last resolution → open a labeled issue AND
        #   ping Telegram with the run URL.
        # - Subsequent failures while the issue is open → append a "still
        #   failing" comment, suppress the Telegram ping.
        # - Operator closes the issue when the underlying problem is fixed;
        #   the next failure after close opens a fresh issue + ping.
        #
        # Trust-boundary note: uses the default GITHUB_TOKEN (independent of
        # the Flux App token deliberately — if the App token mint fails, this
        # path must still work). issues:write is granted at workflow scope.
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          WORKFLOW_NAME: ${{ github.workflow }}
          REPO_FULL_NAME: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ALERT_LABEL: alert-heartbeat
        run: |
          set -euo pipefail

          # Search for an existing open alert issue. The dedupe key.
          # Wrapped in set +e: if the Issues API is degraded we cannot
          # determine dedupe state, but the alarm path must still fire —
          # we treat list-failure as "no existing issue" and fall through
          # to the Telegram-first branch.
          set +e
          EXISTING=$(gh issue list \
            --repo "$REPO_FULL_NAME" \
            --state open \
            --label "$ALERT_LABEL" \
            --limit 1 \
            --json number \
            --jq '.[0].number // empty' 2>/dev/null)
          LIST_RC=$?
          set -e

          if [ "$LIST_RC" -eq 0 ] && [ -n "$EXISTING" ]; then
            # Already alerted — append a comment and suppress Telegram.
            # The comment is best-effort: if it fails, the operator already
            # has the original page, so silence here is acceptable.
            gh issue comment "$EXISTING" \
              --repo "$REPO_FULL_NAME" \
              --body "Still failing: ${RUN_URL}" >/dev/null 2>&1 \
              || echo "::warning::failed to append comment to alert issue #${EXISTING}"
            echo "Alert issue #${EXISTING} updated; Telegram suppressed (dedupe)."
            exit 0
          fi

          # First failure since last resolution.
          # ---- Telegram FIRST ----
          # Telegram is the independent alarm path. Issue creation runs
          # AFTER, so a GitHub Issues / labels API outage cannot silently
          # suppress the page (this is the same ordering the watchdog
          # workflow uses for the same reason). Without this ordering,
          # `set -e` on a failed `gh issue create` would exit before the
          # curl call and Nick would hear nothing — which is the exact
          # silent-failure mode this whole step exists to prevent.
          if [ -n "${TELEGRAM_BOT_TOKEN:-}" ] && [ -n "${TELEGRAM_CHAT_ID:-}" ]; then
            MSG=$(printf "🚨 Flux's '%s' failed.\n\n%s" "$WORKFLOW_NAME" "$RUN_URL")
            curl -fsS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
              --data-urlencode "text=${MSG}" >/dev/null
          else
            echo "Telegram secrets not configured; skipping notification."
          fi

          # ---- Best-effort issue ops AFTER Telegram ----
          # set +e so a labels-API blip cannot demote a successful page
          # into a failed alert step.
          set +e
          gh label create "$ALERT_LABEL" \
            --repo "$REPO_FULL_NAME" \
            --color B60205 \
            --description "Open while ${WORKFLOW_NAME} is failing; close when resolved" \
            --force >/dev/null 2>&1
          BODY=$(printf '🚨 `%s` is failing.\n\nFirst failed run: %s\n\nClose this issue when the underlying problem is resolved. Subsequent failures will be appended here as comments without paging Telegram again.' "$WORKFLOW_NAME" "$RUN_URL")
          gh issue create \
            --repo "$REPO_FULL_NAME" \
            --title "${WORKFLOW_NAME} is failing" \
            --label "$ALERT_LABEL" \
            --body "$BODY" >/dev/null 2>&1
          ISSUE_RC=$?
          set -e
          if [ "$ISSUE_RC" -ne 0 ]; then
            echo "::warning::failed to open alert issue (rc=${ISSUE_RC}); Telegram already sent"
          fi
