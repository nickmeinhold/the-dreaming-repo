# zizmor configuration for the-dreaming-repo.
#
# Workflow lint runs at --min-severity high to catch the script-injection
# and pull_request_target misuse class that bit us on PR #23.
#
# As of the SHA-pin/permissions hardening pass, both `unpinned-uses` and
# `excessive-permissions` are enforced — every action is pinned to a commit
# SHA (Dependabot keeps them fresh; see .github/dependabot.yml) and every
# workflow declares a least-privilege top-level `permissions:` block.
#
# No rule relaxations are currently active. If a future workflow needs an
# inline waiver, prefer `# zizmor: ignore[<rule>]` at the offending line
# (with a justification) over weakening this config globally.

rules: {}
